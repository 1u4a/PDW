<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>‧₊˚ Amigo Animal - Cadastro de Usuário</title>
</head>
<body bgcolor="#778899" link="#000000" vlink="#000000">

    <br><br><br>

    <table width="100%" border="0" cellpadding="10">
        <tr>
            <td align="center">
                
                <table width="50%" border="1" bgcolor="#B0C4DE" bordercolor="#2F4F4F" cellpadding="15">
                    <tr>
                        <td align="center">
                            
                            <h2>Amigo Animal ₍^. .^₎Ⳋ</h2>
                            <h3>Criar nova conta</h3>
                            <hr width="80%">
                            <br>
                            
                            <form action="#" method="post">
                                
                                <fieldset>
                                    <legend><b>Dados Pessoais</b></legend>
                                    
                                    <table border="0" cellpadding="8" width="100%">
                                        <tr>
                                            <td align="right"><b>Nome completo:</b></td>
                                            <td><input type="text" name="nome" size="40"></td>
                                        </tr>
                                        <tr>
                                            <td align="right"><b>Endereço completo:</b></td>
                                            <td><input type="text" name="endereco" size="40"></td>
                                        </tr>
                                        <tr>
                                            <td align="right"><b>Telefone (opcional):</b></td>
                                            <td><input type="tel" name="telefone" size="40"></td>
                                        </tr>
                                    </table>
                                    
                                </fieldset>
                                
                                <br><br>
                                
                                <fieldset>
                                    <legend><b>Dados de Acesso</b></legend>
                                    
                                    <table border="0" cellpadding="8" width="100%">
                                        <tr>
                                            <td align="right"><b>E-mail:</b></td>
                                            <td><input type="email" name="email" size="40"></td>
                                        </tr>
                                        <tr>
                                            <td align="right"><b>Login/Usuário:</b></td>
                                            <td><input type="text" name="login" size="40"></td>
                                        </tr>
                                        <tr>
                                            <td align="right"><b>Senha:</b></td>
                                            <td><input type="password" name="senha" size="40"></td>
                                        </tr>
                                        <tr>
                                            <td align="right"><b>Confirmar senha:</b></td>
                                            <td><input type="password" name="confirma_senha" size="40"></td>
                                        </tr>
                                    </table>
                                    
                                </fieldset>
                                
                                <br><br>
                                
                                <table border="0" width="100%">
                                    <tr>
                                        <td align="center">
                                            <a href="index.html"><button type="button"><b>Cadastrar.</b></button></a>

                                            <button type="reset"><b>🗑️ Limpar tudo</b></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td align="center">
                                            <br>
                                            <hr width="60%">
                                            <p>Já tem cadastro?</p>
                                            <a href="index.html"><button type="button"><b>Faça login aqui!</b></button></a>
                                        </td>
                                    </tr>
                                </table>
                                
                            </form>
                            
                        </td>
                    </tr>
                </table>
                
            </td>
        </tr>
    </table>
    
    <!-- Rodapé -->
    <br><br>
    <hr width="80%">
    <p align="center">
        <small>© 2026 - Amigo Animal - Adoção de Animais</small>
    </p>

</body>
</html>
